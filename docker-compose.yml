services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recipes}
      POSTGRES_USER: ${POSTGRES_USER:-recipes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recipes}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recipes} -d ${POSTGRES_DB:-recipes}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://recipes:recipes@db:5432/recipes?schema=public}
      PORT: ${PORT:-3000}
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  postgres-data:
